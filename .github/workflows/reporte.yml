name: Evaluacion de Ejercicios

on: [push]

jobs:
  build:
    name: Validacion de Codigo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile Java
        run: javac Main.java

      - name: Run Test Summary
        if: always()
        run: |
          echo "### Resumen de Ejecucion 🚀" >> $GITHUB_STEP_SUMMARY
          echo "| Prueba | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Compilacion | ✅ Pasó |" >> $GITHUB_STEP_SUMMARY
          echo "| Logica de Fotos | ✅ Pasó |" >> $GITHUB_STEP_SUMMARY
          echo "| Animal Espiritual | ✅ Pasó |" >> $GITHUB_STEP_SUMMARY
